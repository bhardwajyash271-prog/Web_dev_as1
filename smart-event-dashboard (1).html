<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Event Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .top-section {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #667eea;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(67, 233, 123, 0.4);
        }

        .events-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .events-section button {
            flex: 1;
        }

        .events-list {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .event-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: start;
            transition: transform 0.2s;
        }

        .event-item:hover {
            transform: translateX(5px);
        }

        .event-details h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .event-details p {
            color: #666;
            font-size: 0.9rem;
        }

        .event-category {
            display: inline-block;
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .event-actions button {
            background: #f5576c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .event-actions button:hover {
            background: #d63447;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 60px 20px;
        }

        .demo-section {
            display: flex;
            align-items: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-top: 20px;
        }

        .demo-section span {
            color: #666;
            font-size: 1rem;
        }

        .demo-section .key-display {
            margin-left: 10px;
            color: #333;
            font-weight: 600;
        }

        @media (max-width: 968px) {
            .top-section {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            .events-section {
                flex-direction: column;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
    
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <div class="header-icon">🎯</div>
                Smart Event Dashboard
            </h1>
        </div>

        <div class="top-section">
            <!-- Add New Event Form -->
            <div class="card">
                <h2>Add New Event</h2>
                <form id="eventForm">
                    <div class="form-group">
                        <label for="eventTitle">Event Title:</label>
                        <input type="text" id="eventTitle" placeholder="Enter event title" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="eventDate">Event Date:</label>
                        <input type="date" id="eventDate" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="eventCategory">Category:</label>
                        <select id="eventCategory" required>
                            <option value="Conference">Conference</option>
                            <option value="Workshop">Workshop</option>
                            <option value="Meetup">Meetup</option>
                            <option value="Webinar">Webinar</option>
                            <option value="Social">Social</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="eventDescription">Description:</label>
                        <textarea id="eventDescription" placeholder="Enter event description"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Add Event</button>
                </form>
            </div>

            <!-- My Events List -->
            <div class="card">
                <h2>My Events</h2>
                <div class="events-section">
                    <button class="btn btn-primary" onclick="clearAllEvents()">Clear All Events</button>
                    <button class="btn btn-secondary" onclick="addSampleEvents()">Add Sample Events</button>
                </div>
                
                <div id="eventsList" class="events-list">
                    <div class="empty-state">
                        No events yet. Add your first event!
                    </div>
                </div>
            </div>
        </div>

        <!-- DOM Manipulation Demo -->
        <div class="card">
            <h2>DOM Manipulation Demo</h2>
            <div class="demo-section">
                <span>You Pressed:</span>
                <span id="keyDisplay" class="key-display">Meta</span>
            </div>
        </div>
    </div>

<script src="1.js"></script>
</body>
</html>
